<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>充電系統</title>
</head>
<body>
    <h2>⚡ 裝備充電登錄</h2>
    <select id="batteryId">
        <option value="91車-電池1">91車-電池1</option>
        <option value="92車-電池1">92車-電池1</option>
    </select>
    <button id="startBtn">開始登錄</button>
    <div id="status">準備就緒</div>

    <script>
        // 將此處換成你 GAS 重新部署後的 URL
        const MY_GAS_URL = "https://script.google.com/macros/s/你的亂碼/exec";

        document.getElementById('startBtn').addEventListener('click', function() {
            const batteryId = document.getElementById('batteryId').value;
            const status = document.getElementById('status');
            status.innerText = "傳送中...";
            
            fetch(MY_GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ batteryId: batteryId })
            }).then(() => {
                status.innerText = "✅ 登錄成功";
            }).catch(() => {
                status.innerText = "❌ 傳送失敗";
            });
        });
    </script>
</body>
</html>
